name: ctrla_env
channels:
  - nvidia
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.12.8

  # GPU-enabled PyTorch stack
  - pytorch==2.5.1
  - torchvision==0.20.1
  - torchaudio==2.5.1
  - pytorch-cuda=12.1

  # Pinned dependencies
  - numpy==2.1.3
  - pillow==11.0
  - scipy==1.15
  - matplotlib==3.10
  - pyyaml==6.0.2
  - tqdm==4.65
